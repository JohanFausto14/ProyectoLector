name: Sync Fork

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/desarrolloproyectolector-svg/Front_ProyectoLector.git
          git fetch upstream
          git merge upstream/main --allow-unrelated-histories
          git push origin main